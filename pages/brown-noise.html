<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Brown Noise Generator</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/modern-style.css">
  <style>
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    .noise-card {
      width: 100%;
      max-width: 380px;
      border: 2px solid currentColor;
      padding: 2rem;
      text-align: center;
      box-sizing: border-box;
    }

    .subtitle {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 1.5rem;
      letter-spacing: 0.06em;
    }

    canvas {
      display: block;
      width: 100%;
      max-width: 320px;
      height: 56px;
      margin: 0 auto 1.5rem;
      border: 1px solid currentColor;
      opacity: 0.35;
      transition: opacity 0.4s;
    }

    canvas.active { opacity: 1; }

    .play-btn {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid currentColor;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      transition: background 0.2s;
    }

    .play-btn:hover { background: rgba(128,128,128,0.15); }
    .play-btn svg { width: 26px; height: 26px; fill: currentColor; }

    .control-group {
      width: 100%;
      max-width: 320px;
      margin: 0 auto 1rem;
      text-align: left;
    }

    .control-group label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
      opacity: 0.7;
    }

    .control-group label span { opacity: 1; font-weight: bold; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: currentColor;
      outline: none;
      cursor: pointer;
      opacity: 0.4;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: currentColor;
      cursor: pointer;
      opacity: 1;
    }

    .status {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .status.active { opacity: 0.85; }

    p.description {
      max-width: 380px;
      font-size: 0.9rem;
      line-height: 1.6;
      opacity: 0.75;
    }
  </style>
</head>
<body>
<header>
  <h1>Brown Noise Generator</h1>
  <nav>
  <a href="/index.html">Home</a>
  <a href="/about.html">About Me</a>
  <a href="https://www.linkedin.com/in/caleb-fedyshen" target="_blank" rel="noopener">LinkedIn ↗</a>
  <button id="style-toggle-btn">✨ Modern Style</button>
</nav>
</header>
<main>
  <p class="description">
    Brown noise has a 1/f&sup2; power spectrum — deeper and warmer than white or pink noise.
    Great for focus, sleep, and blocking out distractions.
  </p>

  <div class="noise-card">
    <p class="subtitle">1/f&sup2; spectral density</p>

    <canvas id="waveform"></canvas>

    <button class="play-btn" id="playBtn" title="Play / Pause">
      <svg id="iconPlay" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="iconStop" viewBox="0 0 24 24" style="display:none"><rect x="5" y="4" width="4" height="16"/><rect x="15" y="4" width="4" height="16"/></svg>
    </button>

    <div class="control-group">
      <label>Volume <span id="volVal">20%</span></label>
      <input type="range" id="volume" min="0" max="100" value="20">
    </div>

    <div class="control-group">
      <label>Warmth <span id="warmthVal">8</span></label>
      <input type="range" id="warmth" min="1" max="10" value="8" step="1">
    </div>

    <p class="status" id="status">Paused</p>
  </div>
</main>

<script src="../assets/js/styleToggle.js"></script>
<script>
  let ctx, bufferSource, gainNode, filterNode, analyser;
  let playing = false;
  let animFrame;

  const playBtn      = document.getElementById('playBtn');
  const iconPlay     = document.getElementById('iconPlay');
  const iconStop     = document.getElementById('iconStop');
  const volSlider    = document.getElementById('volume');
  const warmthSlider = document.getElementById('warmth');
  const volVal       = document.getElementById('volVal');
  const warmthVal    = document.getElementById('warmthVal');
  const statusEl     = document.getElementById('status');
  const canvas       = document.getElementById('waveform');
  const canvasCtx    = canvas.getContext('2d');

  function resizeCanvas() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function createBrownNoiseBuffer(audioCtx) {
    const sampleRate   = audioCtx.sampleRate;
    const bufferLength = sampleRate * 4;
    const buffer = audioCtx.createBuffer(1, bufferLength, sampleRate);
    const data   = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferLength; i++) {
      const white = Math.random() * 2 - 1;
      lastOut = (lastOut + 0.02 * white) / 1.02;
      data[i] = lastOut * 3.5;
    }
    return buffer;
  }

  function getFilterFreq(warmth) {
    return 800 - (warmth - 1) * 80;
  }

  function start() {
    ctx = new (window.AudioContext || window.webkitAudioContext)();

    gainNode = ctx.createGain();
    gainNode.gain.setValueAtTime(0, ctx.currentTime);
    gainNode.gain.linearRampToValueAtTime(volSlider.value / 100, ctx.currentTime + 1);

    filterNode = ctx.createBiquadFilter();
    filterNode.type = 'lowpass';
    filterNode.frequency.value = getFilterFreq(parseInt(warmthSlider.value));
    filterNode.Q.value = 0.3;

    analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    bufferSource = ctx.createBufferSource();
    bufferSource.buffer = createBrownNoiseBuffer(ctx);
    bufferSource.loop   = true;

    bufferSource.connect(filterNode);
    filterNode.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(ctx.destination);

    bufferSource.start();
    drawWaveform();
  }

  function stop() {
    if (bufferSource) { bufferSource.stop(); bufferSource = null; }
    if (ctx) { ctx.close(); ctx = null; }
    cancelAnimationFrame(animFrame);
    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function drawWaveform() {
    animFrame = requestAnimationFrame(drawWaveform);
    const bufLen = analyser.frequencyBinCount;
    const dataArr = new Uint8Array(bufLen);
    analyser.getByteTimeDomainData(dataArr);

    canvasCtx.clearRect(0, 0, canvas.width, canvas.height);
    canvasCtx.strokeStyle = getComputedStyle(document.body).color || '#888';
    canvasCtx.lineWidth = 1.5;
    canvasCtx.beginPath();

    const sliceW = canvas.width / bufLen;
    let x = 0;
    for (let i = 0; i < bufLen; i++) {
      const v = dataArr[i] / 128;
      const y = (v * canvas.height) / 2;
      i === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
      x += sliceW;
    }
    canvasCtx.stroke();
  }

  playBtn.addEventListener('click', () => {
    playing = !playing;
    if (playing) {
      start();
      iconPlay.style.display = 'none';
      iconStop.style.display = '';
      canvas.classList.add('active');
      statusEl.textContent = 'Playing';
      statusEl.classList.add('active');
    } else {
      stop();
      iconPlay.style.display = '';
      iconStop.style.display = 'none';
      canvas.classList.remove('active');
      statusEl.textContent = 'Paused';
      statusEl.classList.remove('active');
    }
  });

  volSlider.addEventListener('input', () => {
    volVal.textContent = volSlider.value + '%';
    if (gainNode) gainNode.gain.value = volSlider.value / 100;
  });

  warmthSlider.addEventListener('input', () => {
    warmthVal.textContent = warmthSlider.value;
    if (filterNode) filterNode.frequency.value = getFilterFreq(parseInt(warmthSlider.value));
  });
</script>
</body>
</html>
